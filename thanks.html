<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Application Submitted</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #0a1f5c;
    --blue: #0056b3;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: #eff6ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 60px 48px;
    text-align: center;
    max-width: 480px;
    width: 90%;
    box-shadow: 0 4px 24px rgba(0,86,179,.10);
  }
  .icon { font-size: 64px; margin-bottom: 20px; }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    color: var(--navy);
    margin-bottom: 14px;
  }
  p {
    font-size: 15px;
    color: #475569;
    line-height: 1.7;
    margin-bottom: 10px;
  }
  .ref {
    margin-top: 24px;
    background: #eff6ff;
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 14px;
    color: var(--blue);
    font-weight: 600;
  }
  .btn {
    display: inline-block;
    margin-top: 28px;
    background: linear-gradient(135deg, var(--navy), var(--blue));
    color: white;
    padding: 13px 40px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    box-shadow: 0 4px 16px rgba(0,86,179,.3);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Application Submitted!</h1>
    <p>Thank you! Your application has been received and is currently under review.</p>
    <p>We will contact you within <strong>2–3 business days.</strong></p>
    <div class="ref">✅ Your application has been saved successfully</div>
    <a href="index.html" class="btn">Back to Home</a>
  </div>
</body>
</html>
